name: Build Mobile App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        if: github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        run: |
          npx cap add android || true
          npx cap sync android

          cd android

          # Show current config for debugging
          echo "=== Current variables.gradle ==="
          cat variables.gradle 2>/dev/null || echo "No variables.gradle"
          echo "=== Current build.gradle ==="
          head -30 build.gradle
          echo "=== Current gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties

          # Update Gradle wrapper to 8.9 (required for AGP 8.7.0)
          perl -pi -e 's/gradle-8\.2\.1-all\.zip/gradle-8.9-all.zip/g' gradle/wrapper/gradle-wrapper.properties

          # Update AGP and SDK versions using perl (more reliable than sed)
          perl -pi -e 's/8\.2\.1/8.7.0/g' build.gradle
          perl -pi -e 's/compileSdk = 34/compileSdk = 35/g' variables.gradle
          perl -pi -e 's/targetSdk = 34/targetSdk = 35/g' variables.gradle
          perl -pi -e 's/agp = "8\.2\.1"/agp = "8.7.0"/g' variables.gradle

          # Also update app/build.gradle
          perl -pi -e 's/compileSdk 34/compileSdk 35/g' app/build.gradle
          perl -pi -e 's/targetSdk 34/targetSdk 35/g' app/build.gradle

          echo "=== Updated variables.gradle ==="
          cat variables.gradle 2>/dev/null || echo "No variables.gradle"

          cd ..

      - name: Build Android APK (debug)
        if: github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        run: |
          cd android
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../app-debug.apk

      - name: Upload Android APK
        if: github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app-debug.apk

      - name: Add iOS platform
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Upload iOS project
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ios/