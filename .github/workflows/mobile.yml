name: Build Mobile App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        if: github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        if: github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android

          # 更新版本号
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(echo "$VERSION_NAME" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION_NAME\"/" app/build.gradle
          echo "Version: $VERSION_NAME (code: $VERSION_CODE)"

          # 构建APK（暂用debug，签名配置后再改release）
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk ../简程表-${{ github.ref_name }}.apk

      - name: Upload Android APK Artifact
        if: github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: 简程表-${{ github.ref_name }}.apk

      - name: Release APK to GitHub
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 简程表 ${{ github.ref_name }}
          body: |
            ## 简程表 ${{ github.ref_name }}

            ### 下载
            - 下载 APK 文件安装到 Android 设备

            ### 更新内容
            请查看下方 commits 记录
          files: 简程表-${{ github.ref_name }}.apk
          draft: false
          prerelease: false

      - name: Add iOS platform
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Upload iOS project
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ios/